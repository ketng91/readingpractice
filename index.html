// STATE
let currentTest=1,currentQuestionIndex=0;
let savedAnswers={}; // lưu kiểu { "1-0":2 , "1-1":1 , "2-3":0 }

function loadTest(num){
 currentTest=num;
document.getElementById('title').innerText=
'Read the following passage and mark the letter A, B, C or D to indicate the best answer to each of the following questions.';

 document.getElementById('resultArea').innerHTML='';
 currentQuestionIndex=0;
document.getElementById('translationBox').style.display = 'none';
 document.getElementById('reading').innerHTML = exercises[num].passage.replace(/\n/g,'<br>');
 renderQuestions(); renderPagination();
}

function renderQuestions(){
 const q=exercises[currentTest].questions[currentQuestionIndex];
 let key=currentTest+'-'+currentQuestionIndex;
 let html='<div class="question">'+(currentQuestionIndex+1)+'. '+ q.q +'</div>';

 q.options.forEach((opt,i)=>{
   const checked = savedAnswers[key]==i ? 'checked' : '';
   html+=`<label><input type="radio" name="q${currentQuestionIndex}"
    value="${i}" ${checked} onclick="saveAnswer(${i})"> ${opt}</label>`;
 });

 document.getElementById('questions').innerHTML=html;
}

function saveAnswer(v){
 savedAnswers[currentTest+'-'+currentQuestionIndex]=v;
}

function nextQ(){
 if(currentQuestionIndex < exercises[currentTest].questions.length-1){
   currentQuestionIndex++;
   renderQuestions();
 }
}
function prevQ(){
 if(currentQuestionIndex>0){
   currentQuestionIndex--;
   renderQuestions();
 }
}

function renderPagination(){
 let h='';
 for(let k in exercises)
   h+=`<button onclick="loadTest(${k})">Passage ${k}</button>`;
 document.getElementById('pagination').innerHTML=h;
}

// Confirm box
function openConfirm(){document.getElementById('confirmBox').style.display='flex';}
function closeConfirm(){document.getElementById('confirmBox').style.display='none';}

// SUBMIT
function submitTest(){
 closeConfirm();
 const qs=exercises[currentTest].questions;
 let correct=0,txt='';

 for(let i=0;i<qs.length;i++){
   let key=currentTest+'-'+i;
   let chosen=savedAnswers[key];
   let ok=chosen==qs[i].answer;
   if(ok) correct++;
   txt+=`${i+1}. ${qs[i].q}
Your answer: ${chosen!=null?qs[i].options[chosen]:'(no answer)'}
Correct answer: ${qs[i].options[qs[i].answer]}
${ok?'✓ Correct':'✗ Wrong'}
Giải thích: ${qs[i].explain}\n\n`;
 }

 document.getElementById('resultArea').innerHTML=
 `<div class="result-box">Kết quả: ${correct}/${qs.length}\n\n${txt}</div>`;
}

let selectedRange = null;

// Hiện menu khi chọn chữ hoặc click highlight
document.addEventListener('mouseup', function(e) {
  const sel = window.getSelection();

  // Nếu click vào chữ đã highlight
  if (e.target.classList.contains('highlight')) {
    selectedRange = null;
    showMenu(e.pageX, e.pageY);
    selectedRange = e.target;
    return;
  }

  // Nếu không select gì thì đóng menu
  if (!sel.toString().trim()) {
    hideMenu();
    return;
  }

  selectedRange = sel.getRangeAt(0);
  showMenu(e.pageX, e.pageY);
});

// Highlight
function applyHighlight() {
  if (!selectedRange) return;

  // Nếu click highlight đang tồn tại → bỏ highlight trước rồi tô lại
  if (selectedRange instanceof HTMLElement && selectedRange.classList.contains('highlight')) {
    removeHighlight();
    return;
  }

  const span = document.createElement('span');
  span.className = 'highlight';
  span.appendChild(selectedRange.extractContents());
  selectedRange.insertNode(span);

  selectedRange = null;
  hideMenu();
}

// Remove highlight
function removeHighlight() {
  if (!selectedRange) return;

  if (selectedRange instanceof HTMLElement && selectedRange.classList.contains('highlight')) {
    const parent = selectedRange.parentNode;
    while (selectedRange.firstChild) {
      parent.insertBefore(selectedRange.firstChild, selectedRange);
    }
    parent.removeChild(selectedRange);
  }
  selectedRange = null;
  hideMenu();
}

// menu show/hide
function showMenu(x, y) {
  const box = document.getElementById('textMenu');
  box.style.left = x + 'px';
  box.style.top = y + 'px';
  box.style.display = 'block';
}
function hideMenu() {
  document.getElementById('textMenu').style.display = 'none';
}

(Cơn địa chấn mạnh 7,7 độ vào ngày 28 tháng 3, kèm theo nhiều dư chấn, đã buộc chính quyền phải giữ bệnh nhân ở bên ngoài để tránh nguy cơ bị thương do các công trình sụp đổ.)

The situation is far from ideal for anyone here at the hospital.
(Tình hình tại bệnh viện hiện nay hoàn toàn không lý tưởng đối với bất kỳ ai.)

“We’re doing everything possible under these circumstances,” an anonymous medical worker explained to AFP.
“Chúng tôi đang làm mọi thứ có thể trong hoàn cảnh này,” một nhân viên y tế giấu tên chia sẻ với AFP.

With temperatures reaching 39 degrees Celsius, patients found shelter beneath makeshift tarpaulin covers erected to protect them from the intense sun.
(Với nhiệt độ lên tới 39 độ C, bệnh nhân trú dưới những tấm bạt tạm bợ được dựng lên để che chắn khỏi ánh nắng gay gắt.)

Family members held their relatives’ hands, offering reassurance, while others used bamboo fans to provide relief.
(Người thân nắm tay họ để trấn an, trong khi những người khác dùng quạt tre để giảm bớt cái nóng.)

Young children with injuries cried, and a wounded monk lay connected to an intravenous drip.
(Những đứa trẻ bị thương bật khóc, và một nhà sư bị thương đang nằm truyền dịch.)

Medical staff are equally affected by the crisis.
(Đội ngũ y tế cũng chịu ảnh hưởng nặng nề từ cuộc khủng hoảng này.)

During brief breaks from their grueling work schedules, healthcare workers sat on the ground, attempting to regain their strength.
(Trong những khoảng nghỉ ngắn ngủi giữa lịch làm việc kiệt sức, các nhân viên y tế ngồi xuống đất để cố gắng hồi phục sức lực.)

While the hospital structure appeared intact, only critical care patients and attending physicians stayed indoors.
(Mặc dù cấu trúc bệnh viện dường như vẫn còn nguyên vẹn, chỉ những bệnh nhân cần chăm sóc đặc biệt và các bác sĩ điều trị trực tiếp mới ở lại bên trong.)

Everyone else crowded together under the tarpaulin or found shelter in a nearby area with a metal roof.
(Tất cả những người khác đều chen chúc dưới các tấm bạt hoặc tìm chỗ trú ở khu vực gần đó có mái kim loại.)`,

  2: `For decades, the SAT has functioned as a main door to higher education in the United States, shaping admissions outcomes and perceptions of academic potential.
(Trong nhiều thập kỷ, kỳ thi SAT đã đóng vai trò như cánh cửa chính dẫn đến giáo dục đại học tại Hoa Kỳ, định hình kết quả tuyển sinh và cách nhìn nhận về tiềm năng học thuật.)

Originally conceived to measure ability, the test once symbolized fair opportunity.
(Ban đầu được thiết kế nhằm đo lường năng lực, bài thi này từng tượng trưng cho sự công bằng về cơ hội.)

Yet, in recent years, its fairness and relevance have come under examination, prompting debate about whether standardized testing can represent the complex intelligence of contemporary learners.
(Tuy nhiên, trong những năm gần đây, tính công bằng và mức độ phù hợp của nó đã bị xem xét lại, làm dấy lên tranh luận về việc liệu các bài kiểm tra tiêu chuẩn hóa có thể phản ánh trí tuệ phức tạp của người học hiện đại hay không.)

As education evolves, the SAT finds itself caught between tradition and the demand for comprehensive methods of student readiness.
(Khi giáo dục không ngừng phát triển, SAT đang bị mắc kẹt giữa truyền thống và nhu cầu về những phương thức đánh giá toàn diện hơn về sự sẵn sàng của học sinh.)

The College Board's decision to transition the SAT to a fully digital format marks a significant turning point.
(Quyết định chuyển SAT sang hình thức hoàn toàn kỹ thuật số của College Board đánh dấu một bước ngoặt quan trọng.)

The new SAT, shorter in duration and adaptive in structure, seeks to evaluate reasoning skills with precision and accessibility.
(Phiên bản SAT mới, với thời lượng ngắn hơn và cấu trúc thích ứng, hướng tới việc đánh giá chính xác kỹ năng tư duy và tăng tính tiếp cận.)

Students now complete the exam on laptops or tablets, receiving results within days rather than weeks.
(Học sinh hiện nay làm bài trên máy tính xách tay hoặc máy tính bảng và nhận kết quả chỉ trong vài ngày thay vì vài tuần.)

This digital transformation extends beyond logistical convenience; it mirrors the broader reconfiguration of education in the post-pandemic era, where technology has become inseparable from learning and assessment.
(Sự chuyển đổi số này không chỉ dừng lại ở sự thuận tiện về tổ chức; nó còn phản ánh sự tái cấu trúc rộng lớn của giáo dục trong thời kỳ hậu đại dịch, khi công nghệ đã trở thành yếu tố không thể tách rời khỏi việc học và đánh giá.)

Still, one question remains: can an algorithm truly capture the depth of critical thinking?
(Tuy vậy, một câu hỏi vẫn còn bỏ ngỏ: liệu một thuật toán có thể thực sự nắm bắt được chiều sâu của tư duy phản biện hay không?)

Equity remains the SAT's most persistent challenge.
(Công bằng vẫn là thách thức dai dẳng nhất của SAT.)

Critics argue that the exam continues economic and social inequalities, as students from affluent backgrounds often have access to private tutoring and extensive preparation programs that enhance their scores.
(Những người chỉ trích cho rằng kỳ thi này tiếp tục duy trì bất bình đẳng kinh tế và xã hội, khi học sinh có điều kiện thường được tiếp cận gia sư riêng và các chương trình luyện thi chuyên sâu giúp cải thiện điểm số.)

By contrast, students from under-resourced communities frequently lack comparable support tools.
(Ngược lại, học sinh từ những cộng đồng thiếu thốn nguồn lực thường không có các công cụ hỗ trợ tương tự.)

Although the College Board has expanded fee waivers and developed free online practice tools through initiatives such as its partnership with Khan Academy, these measures only partially reduce systematic unfairness.
(Mặc dù College Board đã mở rộng chính sách miễn giảm lệ phí và phát triển công cụ luyện thi miễn phí thông qua các sáng kiến như hợp tác với Khan Academy, những biện pháp này chỉ phần nào giảm bớt sự bất công mang tính hệ thống.)

The test operates within a system where the playing field is far from level, and genuine potential may be obscured by unequal access to educational resources.
(Bài thi vận hành trong một hệ thống mà “sân chơi” chưa hề công bằng, và tiềm năng thực sự có thể bị che khuất bởi sự chênh lệch trong khả năng tiếp cận nguồn lực giáo dục.)

As an increasing number of universities adopt test-optional or test-blind admissions policies, the SAT faces a critical turning point.
(Khi ngày càng nhiều trường đại học áp dụng chính sách không bắt buộc hoặc không xét điểm thi, SAT đang đứng trước một bước ngoặt quan trọng.)

Proponents argue that standardized assessments remain necessary for maintaining objectivity, particularly amid grade inflation and different curricular standards across schools.
(Những người ủng hộ cho rằng các bài kiểm tra tiêu chuẩn hóa vẫn cần thiết để duy trì tính khách quan, đặc biệt trong bối cảnh lạm phát điểm số và sự khác biệt chương trình học giữa các trường.)

The future of academic evaluation may thus lie in balance — where quantitative measures coexist with comprehensive approaches that value creativity, resilience, and lived experience alongside intellectual performance.
(Vì vậy, tương lai của việc đánh giá học thuật có thể nằm ở sự cân bằng — nơi các thước đo định lượng cùng tồn tại với những phương pháp toàn diện, coi trọng sự sáng tạo, khả năng kiên cường và trải nghiệm thực tế bên cạnh năng lực trí tuệ.)

Whether the SAT endures or diminishes in influence, one principle remains clear: education must evolve not to measure conformity, but to open doors to possibility.
(Dù SAT tiếp tục tồn tại hay suy giảm ảnh hưởng, một nguyên tắc vẫn rõ ràng: giáo dục cần phát triển không phải để đo lường sự đồng nhất, mà để mở ra những cơ hội mới.)`
